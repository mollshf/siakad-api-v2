info:
  name: ResetPassword
  type: http
  seq: 12

http:
  method: POST
  url: "{{url}}/api/user/reset/password"
  headers:
    - name: Authorization
      value: "{{accessToken}}"
  body:
    type: json
    data: "{\r\n    \"username\": \"BBB\"\r\n}"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
