info:
  name: GetUser
  type: http
  seq: 1

http:
  method: GET
  url: "{{url}}/api/user?role=ROLE_MAHASISWA&term=aj&offset=0&limit=50"
  headers:
    - name: Authorization
      value: "{{accessToken}}"
  params:
    - name: role
      value: ROLE_MAHASISWA
      type: query
    - name: term
      value: aj
      type: query
    - name: offset
      value: "0"
      type: query
    - name: limit
      value: "50"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
