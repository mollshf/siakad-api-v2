  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        // Mengambil nilai token dari respons
        var responseBody = res.getBody();
        var token = responseBody.data.token;
        var tokenOTP = responseBody.data.token_otp;
        let id = responseBody.data.id;

        // Menyimpan token ke dalam environment variable

        bru.setEnvVar("accessToken", token);
        bru.setEnvVar("accessTokenOTP", tokenOTP);

        bru.setEnvVar("accestTokenMahasiswa", token);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
