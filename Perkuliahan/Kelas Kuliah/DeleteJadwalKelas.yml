info:
  name: DeleteJadwalKelas
  type: http
  seq: 10

http:
  method: DELETE
  url: "{{url}}/api/perkuliahan/kelaskuliah/:_id/jadwal"
  headers:
    - name: Authorization
      value: "{{accessToken}}"
  params:
    - name: _id
      value: ""
      type: path
  body:
    type: json
    data: |-
      {
        "hari": null, // 1-7 = senin-minggu
        "jam_mulai": "hh:mm",
        "jam_selesai": "hh:mm"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
