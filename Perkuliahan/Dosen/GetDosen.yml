info:
  name: GetDosen
  type: http
  seq: 1

http:
  method: GET
  url: "{{url}}/api/perkuliahan/dosen?offset=1&limit=100"
  headers:
    - name: Authorization
      value: "{{accessToken}}"
  params:
    - name: offset
      value: "1"
      type: query
    - name: limit
      value: "100"
      type: query
    - name: term
      value: faisa
      type: query
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
