docs: |-
  ### POST /api/pmb/export

  This endpoint is used to export collections.

  #### Request Body

  - collections (array of objects): Specify the collections to be exported.
      

  #### **Schema data in** `'`collections`'` field

  The schema data

  Required data:

  ``` json
  {
      "nama_mahasiswa": "string, required",
      "jenis_kelamin": "string, required",
      "kelurahan": "string, required",
      "nik": "string, required",
      "tempat_lahir": "string, required",
      "tanggal_lahir": "string, required",
      "id_kebutuhan_khusus_ayah": "string, required",
      "nama_ibu_kandung": "string, required",
      "id_kebutuhan_khusus_ibu": "string, required",
      "id_kebutuhan_khusus_mahasiswa": "string, required",
      "email": "string, required",
      "penerima_kps": "string, required",
      "id_wilayah": "string, required",
      "id_agama": "string, required",
      "kewarganegaraan": "string, required"
    }

   ```

  Optional Data:

  ``` json
  {
    "jalan": "string, optional",
    "rt": "string, optional",
    "rw": "string, optional",
    "dusun": "string, optional",
    "kode_pos": "string, optional",
    "nisn": "string, optional",
    "nama_ayah": "string, optional",
    "tanggal_lahir_ayah": "string, optional",
    "nik_ayah": "string, optional",
    "jenjang_pendidikan_ayah": "string, optional",
    "id_pekerjaan_ayah": "string, optional",
    "id_penghasilan_ayah": "string, optional",
    "tanggal_lahir_ibu": "string, optional",
    "nik_ibu": "string, optional",
    "id_jenjang_pendidikan_ibu": "string, optional",
    "id_pekerjaan_ibu": "string, optional",
    "id_penghasilan_ibu": "string, optional",
    "nama_wali": "string, optional",
    "telephone": "string, optional",
    "handphone": "string, optional",
    "no_kps": "string, optional",
    "npwp": "string, optional",
    "id_jenis_tinggal": "string, optional",
    "id_alat_transportasi": "string, optional"
  }

   ```

  #### Response

  The response for this request can be represented as a JSON schema:

  ``` json
  {
      "type": "object",
      "properties": {
          "code": {
              "type": "number"
          },
          "message": {
              "type": "string"
          },
          "data": {
              "type": ["object", "null"]
          }
      }
  }

   ```
