info:
  name: gedung
  type: http
  seq: 1

http:
  method: GET
  url: "{{url}}/api/data/gedung-ruangan/gedung?skip=0&limit=10&term=L"
  headers:
    - name: Authorization
      value: "{{accessToken}}"
      disabled: true
  params:
    - name: skip
      value: "0"
      type: query
    - name: limit
      value: "10"
      type: query
    - name: term
      value: L
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
