info:
  name: GetStudentPaymentHistory
  type: http
  seq: 2

http:
  method: GET
  url: "{{url}}/api/maja/siakad"
  headers:
    - name: Authorization
      value: "{{accessToken}}"
  params:
    - name: payment_category
      value: ""
      type: query
      description: category code (not required)
      disabled: true
    - name: payment_method
      value: ""
      type: query
      description: method code (not required)
      disabled: true
    - name: payment_status
      value: "0"
      type: query
      description: status code 0 = pending, 1 = success, 2 = expired (not required)
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
